kind = "video"
previewPath = "/ecoflix-showcase/"
title = "ECOFLIX Feature Showcase"
version = "1.0.0"
id = "artifacts/ecoflix-showcase"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ecoflix-showcase/" ]
localPort = 3003

[services.development]
run = "pnpm --filter @workspace/ecoflix-showcase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecoflix-showcase", "run", "build" ]
publicDir = "artifacts/ecoflix-showcase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3003"
BASE_PATH = "/ecoflix-showcase/"
